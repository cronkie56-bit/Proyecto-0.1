<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Notas privadas</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            color-scheme: dark;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;

            color: #e9e9e9;
            background:
                radial-gradient(
                    circle at 50% 0%,
                    rgba(80, 28, 105, 0.14),
                    transparent 34%
                ),
                #000000;

            font-family: Arial, Helvetica, sans-serif;
        }

        body::after {
            content: "";

            position: fixed;
            inset: 0;
            z-index: 100;

            background:
                repeating-linear-gradient(
                    to bottom,
                    transparent 0,
                    transparent 3px,
                    rgba(255, 255, 255, 0.01) 4px
                );

            pointer-events: none;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .pagina {
            width: min(1180px, 94vw);
            min-height: 100vh;
            margin: 0 auto;
            padding: 24px 0 32px;

            display: flex;
            flex-direction: column;
        }

        .cabecera {
            display: flex;
            align-items: center;
            gap: 14px;

            margin-bottom: 18px;
        }

        .volver {
            min-height: 39px;
            padding: 9px 14px;

            color: #8a8a8a;
            background: #050505;

            border: 1px solid #2d2d2d;
            border-radius: 8px;

            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;

            transition:
                color 0.2s ease,
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.12s ease;
        }

        .volver:hover {
            color: #dedede;
            border-color: #555555;
        }

        .volver:active {
            transform: scale(0.98);
        }

        .titulo-pagina {
            flex: 1;

            color: #f1f1f1;

            font-size: clamp(20px, 3vw, 30px);
            letter-spacing: 2px;

            text-shadow:
                0 0 3px rgba(255, 255, 255, 0.18);
        }

        .usuario-cabecera {
            color: #6f6f6f;

            font-size: 10px;
            letter-spacing: 1px;
            text-align: right;
            text-transform: uppercase;
        }

        .usuario-cabecera strong {
            display: block;

            margin-top: 4px;

            color: #c6a6d7;

            font-size: 12px;
            letter-spacing: 0.8px;
            text-transform: none;
        }

        .panel {
            flex: 1;
            min-height: 640px;

            background: rgba(5, 5, 5, 0.94);

            border: 1px solid rgba(83, 47, 99, 0.72);
            border-radius: 16px;

            box-shadow:
                0 0 8px rgba(90, 39, 115, 0.26),
                0 0 30px rgba(45, 13, 59, 0.16);

            overflow: hidden;
        }

        .vista-bloqueo {
            min-height: 640px;
            padding: 30px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .caja-acceso {
            width: min(410px, 100%);
            padding: 28px;

            background: #080808;

            border: 1px solid #303030;
            border-radius: 13px;

            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .icono-candado {
            width: 58px;
            height: 58px;
            margin: 0 auto 17px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #b487cc;
            background: #130e16;

            border: 1px solid #4e3459;
            border-radius: 50%;

            font-size: 25px;

            box-shadow:
                0 0 12px rgba(122, 67, 146, 0.18);
        }

        .titulo-acceso {
            color: #f0f0f0;

            font-size: 18px;
            letter-spacing: 1.5px;
            text-align: center;
        }

        .descripcion-acceso {
            margin: 10px 0 20px;

            color: #737373;

            font-size: 11px;
            line-height: 1.55;
            text-align: center;
        }

        .formulario-acceso {
            display: flex;
            flex-direction: column;
            gap: 11px;
        }

        .campo-clave {
            width: 100%;
            height: 45px;
            padding: 0 14px;

            color: #eeeeee;
            background: #101010;

            border: 1px solid #2e2e2e;
            border-radius: 8px;

            font-size: 14px;
            outline: none;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .campo-clave:focus {
            border-color: #704083;

            box-shadow:
                0 0 0 2px rgba(112, 64, 131, 0.08);
        }

        .campo-clave::placeholder {
            color: #565656;
        }

        .boton-principal {
            min-height: 43px;
            padding: 10px 15px;

            color: #eadcf1;
            background: #211626;

            border: 1px solid #5d356d;
            border-radius: 8px;

            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;

            transition:
                color 0.2s ease,
                background 0.2s ease,
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.12s ease;
        }

        .boton-principal:hover {
            color: #ffffff;
            background: #2b1932;
            border-color: #8b4ea3;

            box-shadow:
                0 0 10px rgba(141, 68, 166, 0.22);
        }

        .boton-principal:active {
            transform: scale(0.985);
        }

        .boton-principal:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        .aviso-acceso {
            margin-top: 12px;

            color: #5f5f5f;

            font-size: 9px;
            line-height: 1.5;
            text-align: center;
        }

        .estado-acceso {
            min-height: 17px;
            margin-top: 10px;

            color: #777777;

            font-size: 10px;
            line-height: 1.45;
            text-align: center;
        }

        .estado-acceso.error {
            color: #ff6473;
        }

        .estado-acceso.correcto {
            color: #5bd28d;
        }

        .vista-notas {
            min-height: 640px;

            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
        }

        .columna-notas {
            min-width: 0;

            display: flex;
            flex-direction: column;

            background: #080808;

            border-right: 1px solid #272727;
        }

        .controles-lista {
            padding: 15px;

            border-bottom: 1px solid #272727;
        }

        .boton-nueva-nota {
            width: 100%;
            min-height: 42px;

            color: #eadcf1;
            background: #211626;

            border: 1px solid #5d356d;
            border-radius: 8px;

            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;

            transition:
                color 0.2s ease,
                background 0.2s ease,
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.12s ease;
        }

        .boton-nueva-nota:hover {
            color: #ffffff;
            background: #2b1932;
            border-color: #8b4ea3;

            box-shadow:
                0 0 9px rgba(141, 68, 166, 0.2);
        }

        .boton-nueva-nota:active {
            transform: scale(0.985);
        }

        .buscador {
            width: 100%;
            height: 39px;
            margin-top: 10px;
            padding: 0 12px;

            color: #e4e4e4;
            background: #101010;

            border: 1px solid #292929;
            border-radius: 8px;

            font-size: 12px;
            outline: none;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .buscador:focus {
            border-color: #684078;

            box-shadow:
                0 0 0 2px rgba(104, 64, 120, 0.08);
        }

        .buscador::placeholder {
            color: #545454;
        }

        .lista-notas {
            flex: 1;
            min-height: 0;
            max-height: 550px;
            padding: 10px;

            overflow-y: auto;
        }

        .nota-item {
            width: 100%;
            margin-bottom: 8px;
            padding: 12px 11px;

            display: block;

            color: #999999;
            background: #101010;

            border: 1px solid #252525;
            border-radius: 8px;

            text-align: left;

            transition:
                color 0.18s ease,
                background 0.18s ease,
                border-color 0.18s ease,
                transform 0.12s ease;
        }

        .nota-item:hover {
            color: #dedede;
            background: #151216;
            border-color: #50335b;

            transform: translateX(2px);
        }

        .nota-item.activa {
            color: #f0e6f5;
            background: #1b121f;
            border-color: #704282;

            box-shadow:
                inset 3px 0 0 #82509a;
        }

        .nota-item-titulo {
            display: block;

            font-size: 12px;
            font-weight: 600;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .nota-item-resumen {
            display: block;

            margin-top: 5px;

            color: #5d5d5d;

            font-size: 9px;

            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .nota-item-fecha {
            display: block;

            margin-top: 7px;

            color: #454545;

            font-size: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .lista-vacia {
            padding: 30px 17px;

            color: #555555;

            font-size: 10px;
            line-height: 1.55;
            text-align: center;
        }

        .pie-lista {
            padding: 11px 13px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;

            border-top: 1px solid #272727;
        }

        .estado-guardado {
            color: #626262;

            font-size: 9px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .estado-guardado.guardando {
            color: #c19ad8;
        }

        .estado-guardado.guardado {
            color: #58c987;
        }

        .estado-guardado.error {
            color: #ff6473;
        }

        .bloquear {
            padding: 7px 9px;

            color: #7a7a7a;
            background: transparent;

            border: 1px solid #303030;
            border-radius: 7px;

            font-size: 9px;
            letter-spacing: 0.7px;
            text-transform: uppercase;

            transition:
                color 0.2s ease,
                border-color 0.2s ease;
        }

        .bloquear:hover {
            color: #e0e0e0;
            border-color: #575757;
        }

        .editor {
            min-width: 0;
            min-height: 640px;
            padding: 23px;

            display: flex;
            flex-direction: column;

            background: #050505;
        }

        .editor-vacio {
            flex: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #555555;

            font-size: 11px;
            letter-spacing: 0.4px;
            text-align: center;
        }

        .editor-contenido {
            flex: 1;
            min-height: 0;

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .titulo-nota {
            width: 100%;
            height: 47px;
            padding: 0 14px;

            color: #f2f2f2;
            background: #0d0d0d;

            border: 1px solid #292929;
            border-radius: 9px;

            font-size: 17px;
            font-weight: 600;

            outline: none;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .contenido-nota {
            flex: 1;
            width: 100%;
            min-height: 440px;
            padding: 15px;

            color: #d0d0d0;
            background: #0d0d0d;

            border: 1px solid #292929;
            border-radius: 9px;

            font-size: 14px;
            line-height: 1.6;

            resize: none;
            outline: none;

            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .titulo-nota:focus,
        .contenido-nota:focus {
            border-color: #684078;

            box-shadow:
                0 0 0 2px rgba(104, 64, 120, 0.08);
        }

        .titulo-nota::placeholder,
        .contenido-nota::placeholder {
            color: #505050;
        }

        .pie-editor {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .fecha-nota {
            flex: 1;

            color: #505050;

            font-size: 9px;
            line-height: 1.45;
        }

        .eliminar-nota {
            padding: 9px 12px;

            color: #8d5d62;
            background: transparent;

            border: 1px solid #41272b;
            border-radius: 7px;

            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;

            transition:
                color 0.2s ease,
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .eliminar-nota:hover {
            color: #ff6977;
            border-color: #a43c48;

            box-shadow:
                0 0 8px rgba(215, 55, 70, 0.14);
        }

        .error-notas {
            min-height: 16px;
            margin-top: 9px;

            color: #ff6473;

            font-size: 10px;
            text-align: center;
        }

        .oculto {
            display: none !important;
        }

        @media (max-width: 760px) {
            .pagina {
                width: 96vw;
                padding-top: 14px;
            }

            .cabecera {
                flex-wrap: wrap;
            }

            .titulo-pagina {
                order: -1;
                width: 100%;

                text-align: center;
            }

            .usuario-cabecera {
                margin-left: auto;
            }

            .panel,
            .vista-bloqueo {
                min-height: 720px;
            }

            .vista-notas {
                min-height: 720px;

                grid-template-columns: 1fr;
                grid-template-rows: 230px minmax(490px, 1fr);
            }

            .columna-notas {
                border-right: 0;
                border-bottom: 1px solid #272727;
            }

            .lista-notas {
                max-height: 128px;
            }

            .editor {
                min-height: 490px;
                padding: 14px;
            }

            .contenido-nota {
                min-height: 335px;
            }
        }
    </style>
</head>

<body>

    <main class="pagina">

        <header class="cabecera">
            <button
                class="volver"
                id="volverWelcome"
                type="button"
            >
                ← Volver
            </button>

            <h1 class="titulo-pagina">
                NOTAS PRIVADAS
            </h1>

            <div class="usuario-cabecera">
                Usuario
                <strong id="nombreUsuarioCabecera">
                    ---
                </strong>
            </div>
        </header>

        <section class="panel">

            <!-- CREAR O DESBLOQUEAR CONTRASEÑA -->
            <section
                class="vista-bloqueo"
                id="vistaBloqueo"
            >
                <div class="caja-acceso">
                    <div
                        class="icono-candado"
                        aria-hidden="true"
                    >
                        ◇
                    </div>

                    <h2
                        class="titulo-acceso"
                        id="tituloAcceso"
                    >
                        ACCESO PRIVADO
                    </h2>

                    <p
                        class="descripcion-acceso"
                        id="descripcionAcceso"
                    >
                        Cargando protección...
                    </p>

                    <form
                        class="formulario-acceso oculto"
                        id="formCrearClave"
                        autocomplete="off"
                    >
                        <input
                            class="campo-clave"
                            id="nuevaClave"
                            type="password"
                            minlength="8"
                            maxlength="128"
                            placeholder="Crea tu contraseña privada"
                            autocomplete="new-password"
                            required
                        >

                        <input
                            class="campo-clave"
                            id="confirmarClave"
                            type="password"
                            minlength="8"
                            maxlength="128"
                            placeholder="Confirma la contraseña"
                            autocomplete="new-password"
                            required
                        >

                        <button
                            class="boton-principal"
                            id="crearClave"
                            type="submit"
                        >
                            Crear acceso privado
                        </button>
                    </form>

                    <form
                        class="formulario-acceso oculto"
                        id="formDesbloquear"
                        autocomplete="off"
                    >
                        <input
                            class="campo-clave"
                            id="claveAcceso"
                            type="password"
                            maxlength="128"
                            placeholder="Contraseña privada"
                            autocomplete="current-password"
                            required
                        >

                        <button
                            class="boton-principal"
                            id="desbloquear"
                            type="submit"
                        >
                            Desbloquear notas
                        </button>
                    </form>

                    <p class="aviso-acceso">
                        La contraseña no se guarda ni se envía.
                        Si la olvidas, las notas cifradas no podrán recuperarse.
                    </p>

                    <p
                        class="estado-acceso"
                        id="estadoAcceso"
                        aria-live="polite"
                    ></p>
                </div>
            </section>

            <!-- ADMINISTRADOR DE NOTAS -->
            <section
                class="vista-notas oculto"
                id="vistaNotas"
            >
                <aside class="columna-notas">
                    <div class="controles-lista">
                        <button
                            class="boton-nueva-nota"
                            id="nuevaNota"
                            type="button"
                        >
                            + Nueva nota
                        </button>

                        <input
                            class="buscador"
                            id="buscarNotas"
                            type="search"
                            maxlength="120"
                            placeholder="Buscar notas..."
                            autocomplete="off"
                        >
                    </div>

                    <div
                        class="lista-notas"
                        id="listaNotas"
                    ></div>

                    <p
                        class="lista-vacia"
                        id="listaVacia"
                    >
                        Todavía no tienes notas.
                    </p>

                    <footer class="pie-lista">
                        <span
                            class="estado-guardado"
                            id="estadoGuardado"
                            aria-live="polite"
                        >
                            Cifrado activo
                        </span>

                        <button
                            class="bloquear"
                            id="bloquearNotas"
                            type="button"
                        >
                            Bloquear
                        </button>
                    </footer>
                </aside>

                <section class="editor">
                    <div
                        class="editor-vacio"
                        id="editorVacio"
                    >
                        Selecciona una nota o crea una nueva.
                    </div>

                    <div
                        class="editor-contenido oculto"
                        id="editorContenido"
                    >
                        <input
                            class="titulo-nota"
                            id="tituloNota"
                            type="text"
                            maxlength="160"
                            placeholder="Título de la nota"
                            autocomplete="off"
                        >

                        <textarea
                            class="contenido-nota"
                            id="contenidoNota"
                            maxlength="50000"
                            placeholder="Escribe aquí..."
                            spellcheck="true"
                        ></textarea>

                        <footer class="pie-editor">
                            <span
                                class="fecha-nota"
                                id="fechaNota"
                            ></span>

                            <button
                                class="eliminar-nota"
                                id="eliminarNota"
                                type="button"
                            >
                                Eliminar
                            </button>
                        </footer>
                    </div>

                    <p
                        class="error-notas"
                        id="errorNotas"
                        aria-live="polite"
                    ></p>
                </section>
            </section>

        </section>

    </main>

    <script>
        "use strict";

        /* =========================
           SESIÓN DEL USUARIO
        ========================= */

        const usuario =
            sessionStorage.getItem("usuario") ||
            sessionStorage.getItem("usuarioActivo") ||
            localStorage.getItem("usuario");

        if (!usuario) {
            window.location.replace(
                "./index.html"
            );
        }

        const nombreUsuarioCabecera =
            document.getElementById(
                "nombreUsuarioCabecera"
            );

        nombreUsuarioCabecera.textContent =
            usuario || "---";

        document
            .getElementById("volverWelcome")
            .addEventListener(
                "click",
                async () => {
                    await guardarPendiente();

                    claveActiva =
                        null;

                    window.location.href =
                        "./welcome.html";
                }
            );

        /* =========================
           ELEMENTOS DE ACCESO
        ========================= */

        const vistaBloqueo =
            document.getElementById(
                "vistaBloqueo"
            );

        const vistaNotas =
            document.getElementById(
                "vistaNotas"
            );

        const tituloAcceso =
            document.getElementById(
                "tituloAcceso"
            );

        const descripcionAcceso =
            document.getElementById(
                "descripcionAcceso"
            );

        const formCrearClave =
            document.getElementById(
                "formCrearClave"
            );

        const formDesbloquear =
            document.getElementById(
                "formDesbloquear"
            );

        const nuevaClave =
            document.getElementById(
                "nuevaClave"
            );

        const confirmarClave =
            document.getElementById(
                "confirmarClave"
            );

        const claveAcceso =
            document.getElementById(
                "claveAcceso"
            );

        const crearClave =
            document.getElementById(
                "crearClave"
            );

        const desbloquear =
            document.getElementById(
                "desbloquear"
            );

        const estadoAcceso =
            document.getElementById(
                "estadoAcceso"
            );

        /* =========================
           ELEMENTOS DE NOTAS
        ========================= */

        const nuevaNota =
            document.getElementById(
                "nuevaNota"
            );

        const buscarNotas =
            document.getElementById(
                "buscarNotas"
            );

        const listaNotas =
            document.getElementById(
                "listaNotas"
            );

        const listaVacia =
            document.getElementById(
                "listaVacia"
            );

        const estadoGuardado =
            document.getElementById(
                "estadoGuardado"
            );

        const bloquearNotas =
            document.getElementById(
                "bloquearNotas"
            );

        const editorVacio =
            document.getElementById(
                "editorVacio"
            );

        const editorContenido =
            document.getElementById(
                "editorContenido"
            );

        const tituloNota =
            document.getElementById(
                "tituloNota"
            );

        const contenidoNota =
            document.getElementById(
                "contenidoNota"
            );

        const fechaNota =
            document.getElementById(
                "fechaNota"
            );

        const eliminarNota =
            document.getElementById(
                "eliminarNota"
            );

        const errorNotas =
            document.getElementById(
                "errorNotas"
            );

        /* =========================
           CONFIGURACIÓN DE CIFRADO
        ========================= */

        const ITERACIONES =
            250000;

        const idUsuario =
            encodeURIComponent(
                (usuario || "").toLowerCase()
            );

        const claveRegistroPrivado =
            "areaPrivadaCifrada_v1_" +
            idUsuario;

        const claveRegistroNotas =
            "notasPrivadasCifradas_v1_" +
            idUsuario;

        let claveActiva =
            null;

        let notas =
            [];

        let notaActivaId =
            null;

        let notasCargadas =
            false;

        let temporizadorGuardado =
            null;

        let colaGuardado =
            Promise.resolve();

        /* =========================
           EVENTOS
        ========================= */

        formCrearClave.addEventListener(
            "submit",
            crearAccesoPrivado
        );

        formDesbloquear.addEventListener(
            "submit",
            desbloquearNotas
        );

        nuevaNota.addEventListener(
            "click",
            crearNota
        );

        buscarNotas.addEventListener(
            "input",
            renderizarLista
        );

        tituloNota.addEventListener(
            "input",
            actualizarDesdeEditor
        );

        contenidoNota.addEventListener(
            "input",
            actualizarDesdeEditor
        );

        eliminarNota.addEventListener(
            "click",
            eliminarNotaActiva
        );

        bloquearNotas.addEventListener(
            "click",
            bloquear
        );

        window.addEventListener(
            "beforeunload",
            () => {
                claveActiva =
                    null;
            }
        );

        /* =========================
           INICIO
        ========================= */

        prepararAcceso();

        function prepararAcceso() {
            vistaNotas.classList.add(
                "oculto"
            );

            vistaBloqueo.classList.remove(
                "oculto"
            );

            formCrearClave.classList.add(
                "oculto"
            );

            formDesbloquear.classList.add(
                "oculto"
            );

            limpiarCamposAcceso();

            if (!window.crypto?.subtle) {
                mostrarEstadoAcceso(
                    "Este navegador no permite utilizar el cifrado necesario.",
                    "error"
                );

                return;
            }

            const registro =
                obtenerRegistroPrivado();

            if (registro) {
                tituloAcceso.textContent =
                    "DESBLOQUEAR NOTAS";

                descripcionAcceso.textContent =
                    "Introduce la contraseña privada de " +
                    usuario +
                    " para descifrar las notas.";

                formDesbloquear.classList.remove(
                    "oculto"
                );

                setTimeout(
                    () => claveAcceso.focus(),
                    80
                );
            } else {
                tituloAcceso.textContent =
                    "CREAR ACCESO PRIVADO";

                descripcionAcceso.textContent =
                    "Crea una segunda contraseña para proteger las notas de " +
                    usuario +
                    ".";

                formCrearClave.classList.remove(
                    "oculto"
                );

                setTimeout(
                    () => nuevaClave.focus(),
                    80
                );
            }
        }

        function obtenerRegistroPrivado() {
            const texto =
                localStorage.getItem(
                    claveRegistroPrivado
                );

            if (!texto) {
                return null;
            }

            try {
                const registro =
                    JSON.parse(texto);

                if (
                    registro.version !== 1 ||
                    !registro.salt ||
                    !registro.iv ||
                    !registro.verificador
                ) {
                    return null;
                }

                return registro;
            } catch (error) {
                return null;
            }
        }

        async function crearAccesoPrivado(
            evento
        ) {
            evento.preventDefault();

            const primera =
                nuevaClave.value;

            const segunda =
                confirmarClave.value;

            mostrarEstadoAcceso("");

            if (primera.length < 8) {
                mostrarEstadoAcceso(
                    "La contraseña debe tener al menos 8 caracteres.",
                    "error"
                );

                return;
            }

            if (primera !== segunda) {
                mostrarEstadoAcceso(
                    "Las contraseñas no coinciden.",
                    "error"
                );

                return;
            }

            cambiarBotonesAcceso(
                true
            );

            try {
                const salt =
                    crypto.getRandomValues(
                        new Uint8Array(16)
                    );

                const clave =
                    await derivarClave(
                        primera,
                        salt,
                        ITERACIONES
                    );

                const iv =
                    crypto.getRandomValues(
                        new Uint8Array(12)
                    );

                const verificador =
                    JSON.stringify({
                        aplicacion:
                            "Proyecto-0.1",
                        propietario:
                            usuario,
                        tipo:
                            "area-privada",
                        version:
                            1
                    });

                const cifrado =
                    await crypto.subtle.encrypt(
                        {
                            name:
                                "AES-GCM",
                            iv
                        },
                        clave,
                        new TextEncoder().encode(
                            verificador
                        )
                    );

                localStorage.setItem(
                    claveRegistroPrivado,
                    JSON.stringify({
                        version:
                            1,
                        cifrado:
                            "AES-GCM",
                        derivacion:
                            "PBKDF2-SHA-256",
                        iteraciones:
                            ITERACIONES,
                        salt:
                            bytesABase64(
                                salt
                            ),
                        iv:
                            bytesABase64(
                                iv
                            ),
                        verificador:
                            bytesABase64(
                                new Uint8Array(
                                    cifrado
                                )
                            )
                    })
                );

                claveActiva =
                    clave;

                mostrarEstadoAcceso(
                    "Acceso privado creado.",
                    "correcto"
                );

                await abrirAdministrador();
            } catch (error) {
                mostrarEstadoAcceso(
                    "No fue posible crear el acceso privado.",
                    "error"
                );
            } finally {
                cambiarBotonesAcceso(
                    false
                );
            }
        }

        async function desbloquearNotas(
            evento
        ) {
            evento.preventDefault();

            const registro =
                obtenerRegistroPrivado();

            if (!registro) {
                prepararAcceso();
                return;
            }

            cambiarBotonesAcceso(
                true
            );

            mostrarEstadoAcceso(
                "Verificando contraseña..."
            );

            try {
                const clave =
                    await derivarClave(
                        claveAcceso.value,
                        base64ABytes(
                            registro.salt
                        ),
                        registro.iteraciones ||
                        ITERACIONES
                    );

                const plano =
                    await crypto.subtle.decrypt(
                        {
                            name:
                                "AES-GCM",
                            iv:
                                base64ABytes(
                                    registro.iv
                                )
                        },
                        clave,
                        base64ABytes(
                            registro.verificador
                        )
                    );

                const verificacion =
                    JSON.parse(
                        new TextDecoder().decode(
                            plano
                        )
                    );

                if (
                    verificacion.aplicacion !==
                        "Proyecto-0.1" ||
                    verificacion.propietario !==
                        usuario ||
                    verificacion.tipo !==
                        "area-privada"
                ) {
                    throw new Error(
                        "Verificación inválida"
                    );
                }

                claveActiva =
                    clave;

                claveAcceso.value =
                    "";

                await abrirAdministrador();
            } catch (error) {
                claveActiva =
                    null;

                claveAcceso.value =
                    "";

                mostrarEstadoAcceso(
                    "Contraseña privada incorrecta.",
                    "error"
                );

                claveAcceso.focus();
            } finally {
                cambiarBotonesAcceso(
                    false
                );
            }
        }

        async function abrirAdministrador() {
            vistaBloqueo.classList.add(
                "oculto"
            );

            vistaNotas.classList.remove(
                "oculto"
            );

            await cargarNotas();

            renderizarLista();
            mostrarNotaActiva();
        }

        async function bloquear() {
            await guardarPendiente();

            claveActiva =
                null;

            limpiarMemoria();

            prepararAcceso();
        }

        /* =========================
           GESTIÓN DE NOTAS
        ========================= */

        async function cargarNotas() {
            notas =
                [];

            notaActivaId =
                null;

            const texto =
                localStorage.getItem(
                    claveRegistroNotas
                );

            if (!texto) {
                notasCargadas =
                    true;

                actualizarEstadoGuardado(
                    "Cifrado activo"
                );

                return;
            }

            actualizarEstadoGuardado(
                "Descifrando...",
                "guardando"
            );

            try {
                const datos =
                    await descifrar(
                        JSON.parse(texto)
                    );

                if (
                    datos.version !== 1 ||
                    datos.propietario !==
                        usuario ||
                    !Array.isArray(
                        datos.notas
                    )
                ) {
                    throw new Error(
                        "Formato inválido"
                    );
                }

                notas =
                    datos.notas.filter(
                        nota =>
                            nota &&
                            typeof nota.id ===
                            "string"
                    );

                ordenarNotas();

                notaActivaId =
                    notas[0]?.id ||
                    null;

                notasCargadas =
                    true;

                actualizarEstadoGuardado(
                    "Notas descifradas",
                    "guardado"
                );
            } catch (error) {
                notas =
                    [];

                notaActivaId =
                    null;

                notasCargadas =
                    true;

                errorNotas.textContent =
                    "No fue posible descifrar las notas guardadas.";

                actualizarEstadoGuardado(
                    "Error de cifrado",
                    "error"
                );
            }
        }

        function crearNota() {
            if (!claveActiva) {
                return;
            }

            const ahora =
                new Date().toISOString();

            const nota = {
                id:
                    crearId(),
                titulo:
                    "",
                contenido:
                    "",
                creadaEn:
                    ahora,
                modificadaEn:
                    ahora
            };

            notas.unshift(
                nota
            );

            notaActivaId =
                nota.id;

            buscarNotas.value =
                "";

            renderizarLista();
            mostrarNotaActiva();

            tituloNota.focus();

            programarGuardado(
                40
            );
        }

        function crearId() {
            if (crypto.randomUUID) {
                return crypto.randomUUID();
            }

            return Array.from(
                crypto.getRandomValues(
                    new Uint8Array(16)
                )
            )
                .map(
                    numero =>
                        numero
                            .toString(16)
                            .padStart(2, "0")
                )
                .join("");
        }

        function obtenerNotaActiva() {
            return notas.find(
                nota =>
                    nota.id ===
                    notaActivaId
            ) || null;
        }

        function seleccionarNota(
            id
        ) {
            notaActivaId =
                id;

            renderizarLista();
            mostrarNotaActiva();
        }

        function mostrarNotaActiva() {
            const nota =
                obtenerNotaActiva();

            if (!nota) {
                editorContenido.classList.add(
                    "oculto"
                );

                editorVacio.classList.remove(
                    "oculto"
                );

                tituloNota.value =
                    "";

                contenidoNota.value =
                    "";

                fechaNota.textContent =
                    "";

                return;
            }

            editorVacio.classList.add(
                "oculto"
            );

            editorContenido.classList.remove(
                "oculto"
            );

            tituloNota.value =
                nota.titulo || "";

            contenidoNota.value =
                nota.contenido || "";

            fechaNota.textContent =
                "Creada: " +
                formatearFecha(
                    nota.creadaEn
                ) +
                " · Modificada: " +
                formatearFecha(
                    nota.modificadaEn
                );
        }

        function actualizarDesdeEditor() {
            const nota =
                obtenerNotaActiva();

            if (!nota) {
                return;
            }

            nota.titulo =
                tituloNota.value;

            nota.contenido =
                contenidoNota.value;

            nota.modificadaEn =
                new Date().toISOString();

            fechaNota.textContent =
                "Creada: " +
                formatearFecha(
                    nota.creadaEn
                ) +
                " · Modificada: " +
                formatearFecha(
                    nota.modificadaEn
                );

            renderizarLista();

            programarGuardado(
                420
            );
        }

        function renderizarLista() {
            listaNotas.innerHTML =
                "";

            ordenarNotas();

            const consulta =
                buscarNotas.value
                    .trim()
                    .toLocaleLowerCase(
                        "es"
                    );

            const visibles =
                notas.filter(
                    nota => {
                        if (!consulta) {
                            return true;
                        }

                        return (
                            (
                                nota.titulo +
                                " " +
                                nota.contenido
                            )
                                .toLocaleLowerCase(
                                    "es"
                                )
                                .includes(
                                    consulta
                                )
                        );
                    }
                );

            listaVacia.style.display =
                visibles.length
                    ? "none"
                    : "block";

            listaVacia.textContent =
                notas.length
                    ? "No hay notas que coincidan con la búsqueda."
                    : "Todavía no tienes notas.";

            visibles.forEach(
                nota => {
                    const boton =
                        document.createElement(
                            "button"
                        );

                    boton.type =
                        "button";

                    boton.className =
                        "nota-item" +
                        (
                            nota.id ===
                            notaActivaId
                                ? " activa"
                                : ""
                        );

                    const titulo =
                        document.createElement(
                            "span"
                        );

                    titulo.className =
                        "nota-item-titulo";

                    titulo.textContent =
                        nota.titulo.trim() ||
                        "Nota sin título";

                    const resumen =
                        document.createElement(
                            "span"
                        );

                    resumen.className =
                        "nota-item-resumen";

                    resumen.textContent =
                        nota.contenido
                            .replace(
                                /\s+/g,
                                " "
                            )
                            .trim() ||
                        "Sin contenido";

                    const fecha =
                        document.createElement(
                            "span"
                        );

                    fecha.className =
                        "nota-item-fecha";

                    fecha.textContent =
                        formatearFechaCorta(
                            nota.modificadaEn
                        );

                    boton.append(
                        titulo,
                        resumen,
                        fecha
                    );

                    boton.addEventListener(
                        "click",
                        () => {
                            seleccionarNota(
                                nota.id
                            );
                        }
                    );

                    listaNotas.appendChild(
                        boton
                    );
                }
            );
        }

        function ordenarNotas() {
            notas.sort(
                (a, b) =>
                    new Date(
                        b.modificadaEn
                    ).getTime() -
                    new Date(
                        a.modificadaEn
                    ).getTime()
            );
        }

        async function eliminarNotaActiva() {
            const nota =
                obtenerNotaActiva();

            if (!nota) {
                return;
            }

            const nombre =
                nota.titulo.trim() ||
                "esta nota";

            if (
                !window.confirm(
                    '¿Eliminar "' +
                    nombre +
                    '" definitivamente?'
                )
            ) {
                return;
            }

            notas =
                notas.filter(
                    elemento =>
                        elemento.id !==
                        nota.id
                );

            notaActivaId =
                notas[0]?.id ||
                null;

            renderizarLista();
            mostrarNotaActiva();

            await guardarNotas();

            actualizarEstadoGuardado(
                "Nota eliminada",
                "guardado"
            );
        }

        function programarGuardado(
            espera = 420
        ) {
            clearTimeout(
                temporizadorGuardado
            );

            actualizarEstadoGuardado(
                "Guardando...",
                "guardando"
            );

            temporizadorGuardado =
                setTimeout(
                    () => {
                        temporizadorGuardado =
                            null;

                        guardarNotas();
                    },
                    espera
                );
        }

        async function guardarPendiente() {
            if (
                temporizadorGuardado
            ) {
                clearTimeout(
                    temporizadorGuardado
                );

                temporizadorGuardado =
                    null;

                await guardarNotas();
            } else {
                await colaGuardado;
            }
        }

        function guardarNotas() {
            if (
                !claveActiva ||
                !notasCargadas
            ) {
                return Promise.resolve();
            }

            const copia =
                notas.map(
                    nota => ({
                        id:
                            nota.id,
                        titulo:
                            nota.titulo || "",
                        contenido:
                            nota.contenido || "",
                        creadaEn:
                            nota.creadaEn,
                        modificadaEn:
                            nota.modificadaEn
                    })
                );

            colaGuardado =
                colaGuardado
                    .catch(
                        () => undefined
                    )
                    .then(
                        async () => {
                            try {
                                const cifrado =
                                    await cifrar({
                                        version:
                                            1,
                                        propietario:
                                            usuario,
                                        guardadoEn:
                                            new Date()
                                                .toISOString(),
                                        notas:
                                            copia
                                    });

                                localStorage.setItem(
                                    claveRegistroNotas,
                                    JSON.stringify(
                                        cifrado
                                    )
                                );

                                actualizarEstadoGuardado(
                                    "Guardado cifrado",
                                    "guardado"
                                );

                                errorNotas.textContent =
                                    "";
                            } catch (error) {
                                actualizarEstadoGuardado(
                                    "Error al guardar",
                                    "error"
                                );

                                errorNotas.textContent =
                                    error?.name ===
                                    "QuotaExceededError"
                                        ? "El navegador no tiene espacio suficiente."
                                        : "No fue posible guardar los cambios.";
                            }
                        }
                    );

            return colaGuardado;
        }

        function limpiarMemoria() {
            clearTimeout(
                temporizadorGuardado
            );

            temporizadorGuardado =
                null;

            notas =
                [];

            notaActivaId =
                null;

            notasCargadas =
                false;

            buscarNotas.value =
                "";

            listaNotas.innerHTML =
                "";

            errorNotas.textContent =
                "";

            mostrarNotaActiva();

            actualizarEstadoGuardado(
                "Cifrado activo"
            );
        }

        /* =========================
           CIFRADO
        ========================= */

        async function derivarClave(
            contrasena,
            salt,
            iteraciones
        ) {
            const material =
                await crypto.subtle.importKey(
                    "raw",
                    new TextEncoder().encode(
                        contrasena
                    ),
                    "PBKDF2",
                    false,
                    [
                        "deriveKey"
                    ]
                );

            return crypto.subtle.deriveKey(
                {
                    name:
                        "PBKDF2",
                    hash:
                        "SHA-256",
                    salt,
                    iterations:
                        iteraciones
                },
                material,
                {
                    name:
                        "AES-GCM",
                    length:
                        256
                },
                false,
                [
                    "encrypt",
                    "decrypt"
                ]
            );
        }

        async function cifrar(
            contenido
        ) {
            if (!claveActiva) {
                throw new Error(
                    "Notas bloqueadas"
                );
            }

            const iv =
                crypto.getRandomValues(
                    new Uint8Array(12)
                );

            const cifrado =
                await crypto.subtle.encrypt(
                    {
                        name:
                            "AES-GCM",
                        iv
                    },
                    claveActiva,
                    new TextEncoder().encode(
                        JSON.stringify(
                            contenido
                        )
                    )
                );

            return {
                iv:
                    bytesABase64(iv),
                contenido:
                    bytesABase64(
                        new Uint8Array(
                            cifrado
                        )
                    )
            };
        }

        async function descifrar(
            registro
        ) {
            if (!claveActiva) {
                throw new Error(
                    "Notas bloqueadas"
                );
            }

            const plano =
                await crypto.subtle.decrypt(
                    {
                        name:
                            "AES-GCM",
                        iv:
                            base64ABytes(
                                registro.iv
                            )
                    },
                    claveActiva,
                    base64ABytes(
                        registro.contenido
                    )
                );

            return JSON.parse(
                new TextDecoder().decode(
                    plano
                )
            );
        }

        function bytesABase64(
            bytes
        ) {
            let binario =
                "";

            for (
                let i = 0;
                i < bytes.length;
                i += 1
            ) {
                binario +=
                    String.fromCharCode(
                        bytes[i]
                    );
            }

            return btoa(
                binario
            );
        }

        function base64ABytes(
            texto
        ) {
            const binario =
                atob(texto);

            const bytes =
                new Uint8Array(
                    binario.length
                );

            for (
                let i = 0;
                i < binario.length;
                i += 1
            ) {
                bytes[i] =
                    binario.charCodeAt(
                        i
                    );
            }

            return bytes;
        }

        /* =========================
           UTILIDADES
        ========================= */

        function limpiarCamposAcceso() {
            nuevaClave.value =
                "";

            confirmarClave.value =
                "";

            claveAcceso.value =
                "";

            mostrarEstadoAcceso("");
        }

        function cambiarBotonesAcceso(
            bloqueados
        ) {
            crearClave.disabled =
                bloqueados;

            desbloquear.disabled =
                bloqueados;
        }

        function mostrarEstadoAcceso(
            mensaje,
            tipo = ""
        ) {
            estadoAcceso.textContent =
                mensaje;

            estadoAcceso.className =
                "estado-acceso" +
                (
                    tipo
                        ? " " + tipo
                        : ""
                );
        }

        function actualizarEstadoGuardado(
            texto,
            tipo = ""
        ) {
            estadoGuardado.textContent =
                texto;

            estadoGuardado.className =
                "estado-guardado" +
                (
                    tipo
                        ? " " + tipo
                        : ""
                );
        }

        function formatearFecha(
            iso
        ) {
            const fecha =
                new Date(iso);

            if (
                Number.isNaN(
                    fecha.getTime()
                )
            ) {
                return "sin fecha";
            }

            return fecha.toLocaleString(
                "es-ES",
                {
                    day:
                        "2-digit",
                    month:
                        "short",
                    year:
                        "numeric",
                    hour:
                        "2-digit",
                    minute:
                        "2-digit"
                }
            );
        }

        function formatearFechaCorta(
            iso
        ) {
            const fecha =
                new Date(iso);

            if (
                Number.isNaN(
                    fecha.getTime()
                )
            ) {
                return "Sin fecha";
            }

            return fecha.toLocaleString(
                "es-ES",
                {
                    day:
                        "2-digit",
                    month:
                        "short",
                    hour:
                        "2-digit",
                    minute:
                        "2-digit"
                }
            );
        }
    </script>
